AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Kaevo Cloud backend with production identity and sender-constrained sessions

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, production]

  DevApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Non-production migration key. Ignored and omitted from the production function environment.

  PlaybackGrantSigningKey:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: HMAC signing key used for grants bound to paired Kaevo Jellyfin Plugin connectors

  PlaybackRelayPublicUrl:
    Type: String
    Default: ""
    Description: Public HTTPS origin of the separate long-lived Kaevo playback relay

  CognitoUserPoolTier:
    Type: String
    Default: ESSENTIALS
    AllowedValues: [ESSENTIALS, PLUS]
    Description: Access-token customization requires Cognito Essentials or Plus. Confirm cost before deployment.

Conditions:
  IsProduction: !Equals [!Ref EnvironmentName, production]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 15
    MemorySize: 128
    Architectures:
      - arm64

Resources:
  KaevoCloudHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: dev
      DefaultRouteSettings:
        ThrottlingBurstLimit: 80
        ThrottlingRateLimit: 40
      RouteSettings:
        "POST /v1/trials/start":
          ThrottlingBurstLimit: 5
          ThrottlingRateLimit: 1
        "POST /v1/trials/activate":
          ThrottlingBurstLimit: 20
          ThrottlingRateLimit: 5
        "POST /v1/app-sessions/refresh":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 2
        "POST /v2/identity/enroll-owner":
          ThrottlingBurstLimit: 3
          ThrottlingRateLimit: 1
      Auth:
        Authorizers:
          KaevoOwnerAuthorizer:
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${KaevoUserPool}
              audience:
                - !Ref KaevoUserPoolClient
            IdentitySource: "$request.header.Authorization"
          KaevoEnrollmentAuthorizer:
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${KaevoUserPool}
              audience:
                - !Ref KaevoEnrollmentUserPoolClient
            IdentitySource: "$request.header.Authorization"

  KaevoProfileEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: kaevo-cloud-dev-profile-events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: profile_id
          AttributeType: S
        - AttributeName: event_key
          AttributeType: S
      KeySchema:
        - AttributeName: profile_id
          KeyType: HASH
        - AttributeName: event_key
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  KaevoProfileSettingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: kaevo-cloud-dev-profile-settings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: profile_id
          AttributeType: S
      KeySchema:
        - AttributeName: profile_id
          KeyType: HASH

  KaevoDevicesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: kaevo-cloud-dev-devices
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: device_id
          AttributeType: S
        - AttributeName: profile_id
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
      KeySchema:
        - AttributeName: device_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: profile_id-updated_at-index
          KeySchema:
            - AttributeName: profile_id
              KeyType: HASH
            - AttributeName: updated_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  KaevoEntitlementsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: kaevo-cloud-dev-entitlements
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: profile_id
          AttributeType: S
      KeySchema:
        - AttributeName: profile_id
          KeyType: HASH

  KaevoAppSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: kaevo-cloud-dev-app-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token_hash
          AttributeType: S
        - AttributeName: family_id
          AttributeType: S
        - AttributeName: created_at_epoch
          AttributeType: N
        - AttributeName: installation_id
          AttributeType: S
      KeySchema:
        - AttributeName: token_hash
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: family_id-created_at_epoch-index
          KeySchema:
            - AttributeName: family_id
              KeyType: HASH
            - AttributeName: created_at_epoch
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: installation_id-created_at_epoch-index
          KeySchema:
            - AttributeName: installation_id
              KeyType: HASH
            - AttributeName: created_at_epoch
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  KaevoPrincipalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub kaevo-cloud-${EnvironmentName}-principals
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: principal_id
          AttributeType: S
      KeySchema:
        - AttributeName: principal_id
          KeyType: HASH

  KaevoIdentityMembershipsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub kaevo-cloud-${EnvironmentName}-identity-memberships
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: principal_id
          AttributeType: S
      KeySchema:
        - AttributeName: principal_id
          KeyType: HASH
      Tags:
        - Key: KaevoDataClass
          Value: identity-authority

  KaevoIdentityHouseholdsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub kaevo-cloud-${EnvironmentName}-identity-households
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: household_id
          AttributeType: S
      KeySchema:
        - AttributeName: household_id
          KeyType: HASH
      Tags:
        - Key: KaevoDataClass
          Value: identity-authority

  KaevoIdentityProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub kaevo-cloud-${EnvironmentName}-identity-profiles
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: profile_id
          AttributeType: S
      KeySchema:
        - AttributeName: profile_id
          KeyType: HASH
      Tags:
        - Key: KaevoDataClass
          Value: identity-authority

  KaevoInstallationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub kaevo-cloud-${EnvironmentName}-installations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: installation_id
          AttributeType: S
        - AttributeName: household_id
          AttributeType: S
        - AttributeName: created_at_epoch
          AttributeType: N
      KeySchema:
        - AttributeName: installation_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: household_id-created_at_epoch-index
          KeySchema:
            - AttributeName: household_id
              KeyType: HASH
            - AttributeName: created_at_epoch
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  KaevoSecurityAuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub kaevo-cloud-${EnvironmentName}-security-audit
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: household_id
          AttributeType: S
        - AttributeName: event_id
          AttributeType: S
      KeySchema:
        - AttributeName: household_id
          KeyType: HASH
        - AttributeName: event_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  KaevoAuditReferenceSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub kaevo-cloud-${EnvironmentName}-audit-reference-v1
      Description: Environment-scoped HMAC key for privacy-safe security-audit references
      GenerateSecretString:
        PasswordLength: 64
        ExcludePunctuation: true
      Tags:
        - Key: KaevoDataClass
          Value: security-audit-reference-key

  KaevoHomeConnectorsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: kaevo-cloud-dev-home-connectors
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connector_id
          AttributeType: S
        - AttributeName: profile_id
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
      KeySchema:
        - AttributeName: connector_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: profile_id-updated_at-index
          KeySchema:
            - AttributeName: profile_id
              KeyType: HASH
            - AttributeName: updated_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  KaevoRemoteRequestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: kaevo-cloud-dev-remote-requests
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: request_id
          AttributeType: S
        - AttributeName: connector_id
          AttributeType: S
        - AttributeName: status_created_at
          AttributeType: S
      KeySchema:
        - AttributeName: request_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      GlobalSecondaryIndexes:
        - IndexName: connector_id-status_created_at-index
          KeySchema:
            - AttributeName: connector_id
              KeyType: HASH
            - AttributeName: status_created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  KaevoRemotePayloadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireRemotePayloads
            Status: Enabled
            ExpirationInDays: 1

  KaevoProfileAvatarsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldAvatarVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30

  KaevoIdentityClaimIssuerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub kaevo-cloud-${EnvironmentName}-identity-claim-issuer
      CodeUri: ../api/src/
      Handler: claim_issuer.lambda_handler
      Timeout: 5
      MemorySize: 128
      ReservedConcurrentExecutions: 20
      Environment:
        Variables:
          PRINCIPALS_TABLE: !Ref KaevoPrincipalsTable
          IDENTITY_MEMBERSHIPS_TABLE: !Ref KaevoIdentityMembershipsTable
          IDENTITY_HOUSEHOLDS_TABLE: !Ref KaevoIdentityHouseholdsTable
          IDENTITY_PROFILES_TABLE: !Ref KaevoIdentityProfilesTable
          EXPECTED_USER_POOL_NAME: !Sub kaevo-cloud-${EnvironmentName}-users
          EXPECTED_MAIN_CLIENT_NAME: !Sub kaevo-cloud-${EnvironmentName}-ios-tvos
          EXPECTED_ENROLLMENT_CLIENT_NAME: !Sub kaevo-cloud-${EnvironmentName}-owner-enrollment
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Sid: ReadAuthoritativeIdentityGraph
              Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource:
                - !GetAtt KaevoPrincipalsTable.Arn
                - !GetAtt KaevoIdentityMembershipsTable.Arn
                - !GetAtt KaevoIdentityHouseholdsTable.Arn
                - !GetAtt KaevoIdentityProfilesTable.Arn
            - Sid: ValidateInvokingCognitoPoolAndClient
              Effect: Allow
              Action:
                - cognito-idp:DescribeUserPool
                - cognito-idp:DescribeUserPoolClient
              Resource: "*"
      Tags:
        KaevoSecurityBoundary: identity-claim-issuer

  KaevoIdentityClaimIssuerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/kaevo-cloud-${EnvironmentName}-identity-claim-issuer
      RetentionInDays: 30

  KaevoUserPool:
    Type: AWS::Cognito::UserPool
    DependsOn:
      - KaevoIdentityClaimIssuerPermission
    Properties:
      UserPoolName: !Sub kaevo-cloud-${EnvironmentName}-users
      UserPoolTier: !Ref CognitoUserPoolTier
      LambdaConfig:
        PreTokenGenerationConfig:
          LambdaArn: !GetAtt KaevoIdentityClaimIssuerFunction.Arn
          LambdaVersion: V2_0
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: OPTIONAL
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      WebAuthnUserVerification: required
      Policies:
        PasswordPolicy:
          MinimumLength: 14
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true

  KaevoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub kaevo-cloud-${EnvironmentName}-ios-tvos
      UserPoolId: !Ref KaevoUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_AUTH
      AccessTokenValidity: 15
      IdTokenValidity: 15
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      EnableTokenRevocation: true
      ReadAttributes:
        - email
        - email_verified
      WriteAttributes:
        - email

  KaevoEnrollmentUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub kaevo-cloud-${EnvironmentName}-owner-enrollment
      UserPoolId: !Ref KaevoUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_AUTH
      AccessTokenValidity: 5
      IdTokenValidity: 5
      RefreshTokenValidity: 1
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      EnableTokenRevocation: true
      ReadAttributes:
        - email
        - email_verified
      WriteAttributes:
        - email

  KaevoIdentityClaimIssuerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref KaevoIdentityClaimIssuerFunction
      Principal: cognito-idp.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub arn:${AWS::Partition}:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*

  KaevoOwnerEnrollmentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub kaevo-cloud-${EnvironmentName}-owner-enrollment
      CodeUri: ../api/src/
      Handler: identity_enrollment.lambda_handler
      Timeout: 10
      MemorySize: 128
      ReservedConcurrentExecutions: 5
      Environment:
        Variables:
          KAEVO_ENV: !Ref EnvironmentName
          PRINCIPALS_TABLE: !Ref KaevoPrincipalsTable
          IDENTITY_MEMBERSHIPS_TABLE: !Ref KaevoIdentityMembershipsTable
          IDENTITY_HOUSEHOLDS_TABLE: !Ref KaevoIdentityHouseholdsTable
          IDENTITY_PROFILES_TABLE: !Ref KaevoIdentityProfilesTable
          SECURITY_AUDIT_TABLE: !Ref KaevoSecurityAuditTable
          AUDIT_REFERENCE_SECRET_ARN: !Ref KaevoAuditReferenceSecret
          EXPECTED_COGNITO_ISSUER: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${KaevoUserPool}
          EXPECTED_ENROLLMENT_CLIENT_ID: !Ref KaevoEnrollmentUserPoolClient
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Sid: BootstrapAuthoritativeIdentityGraph
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:TransactWriteItems
              Resource:
                - !GetAtt KaevoPrincipalsTable.Arn
                - !GetAtt KaevoIdentityMembershipsTable.Arn
                - !GetAtt KaevoIdentityHouseholdsTable.Arn
                - !GetAtt KaevoIdentityProfilesTable.Arn
                - !GetAtt KaevoSecurityAuditTable.Arn
            - Sid: ReadAuditReferenceKey
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref KaevoAuditReferenceSecret
      Events:
        EnrollOwner:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v2/identity/enroll-owner
            Method: POST
            Auth:
              Authorizer: KaevoEnrollmentAuthorizer
      Tags:
        KaevoSecurityBoundary: identity-owner-enrollment

  KaevoOwnerEnrollmentLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/kaevo-cloud-${EnvironmentName}-owner-enrollment
      RetentionInDays: 30

  KaevoCloudApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub kaevo-cloud-${EnvironmentName}-api
      CodeUri: ../api/src/
      Handler: handler.lambda_handler
      Environment:
        Variables:
          KAEVO_ENV: !Ref EnvironmentName
          DEV_API_KEY: !If [IsProduction, "", !Ref DevApiKey]
          PROFILE_EVENTS_TABLE: !Ref KaevoProfileEventsTable
          PROFILE_SETTINGS_TABLE: !Ref KaevoProfileSettingsTable
          DEVICES_TABLE: !Ref KaevoDevicesTable
          ENTITLEMENTS_TABLE: !Ref KaevoEntitlementsTable
          HOME_CONNECTORS_TABLE: !Ref KaevoHomeConnectorsTable
          REMOTE_REQUESTS_TABLE: !Ref KaevoRemoteRequestsTable
          REMOTE_PAYLOADS_BUCKET: !Ref KaevoRemotePayloadsBucket
          PROFILE_AVATARS_BUCKET: !Ref KaevoProfileAvatarsBucket
          APP_SESSIONS_TABLE: !Ref KaevoAppSessionsTable
          PRINCIPALS_TABLE: !Ref KaevoPrincipalsTable
          INSTALLATIONS_TABLE: !Ref KaevoInstallationsTable
          SECURITY_AUDIT_TABLE: !Ref KaevoSecurityAuditTable
          AUDIT_REFERENCE_SECRET_ARN: !Ref KaevoAuditReferenceSecret
          PLAYBACK_GRANT_SIGNING_KEY: !Ref PlaybackGrantSigningKey
          PLAYBACK_RELAY_PUBLIC_URL: !Ref PlaybackRelayPublicUrl
          EXPECTED_COGNITO_ISSUER: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${KaevoUserPool}
          EXPECTED_MAIN_CLIENT_ID: !Ref KaevoUserPoolClient
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref KaevoProfileEventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref KaevoProfileSettingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref KaevoDevicesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref KaevoEntitlementsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref KaevoHomeConnectorsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref KaevoRemoteRequestsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref KaevoAppSessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref KaevoPrincipalsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref KaevoInstallationsTable
        - Statement:
            - Sid: ConnectorLifecycleTransactions
              Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:TransactWriteItems
              Resource:
                - !GetAtt KaevoHomeConnectorsTable.Arn
                - !GetAtt KaevoAppSessionsTable.Arn
                - !GetAtt KaevoSecurityAuditTable.Arn
            - Sid: ReadAuditReferenceKey
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref KaevoAuditReferenceSecret
        - S3CrudPolicy:
            BucketName: !Ref KaevoRemotePayloadsBucket
        - S3CrudPolicy:
            BucketName: !Ref KaevoProfileAvatarsBucket
      Events:
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /
            Method: GET

        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /health
            Method: GET

        CaptureEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/events
            Method: POST

        CaptureEventsBatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/events/batch
            Method: POST

        RecentEvents:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/events/recent
            Method: GET

        GetEntitlements:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/entitlements
            Method: GET

        PutEntitlements:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/entitlements
            Method: PUT

        RegisterDevice:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/devices/register
            Method: POST

        ListDevices:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/devices
            Method: GET

        GetProfileSettings:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/profiles/{profileId}/settings
            Method: GET

        PutProfileSettings:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/profiles/{profileId}/settings
            Method: PUT

        ProfileAvatar:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/profiles/{profileId}/avatar
            Method: ANY

        PersonalizedHome:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/home/personalized
            Method: GET

        ProviderSettings:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/provider-settings
            Method: GET

        PutProviderSettings:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/provider-settings
            Method: PUT

        StartCloudTrial:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/trials/start
            Method: POST

        ActivateCloudTrial:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/trials/activate
            Method: POST

        MigrateAppSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/app-sessions/migrate
            Method: POST

        RefreshAppSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/app-sessions/refresh
            Method: POST

        RegisterInstallationV2:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v2/installations
            Method: POST
            Auth:
              Authorizer: KaevoOwnerAuthorizer

        IssueBoundSessionV2:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v2/app-sessions
            Method: POST
            Auth:
              Authorizer: KaevoOwnerAuthorizer

        RefreshBoundSessionV2:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v2/app-sessions/refresh
            Method: POST

        RevokeInstallationV2:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v2/installations/{installationId}/revoke
            Method: POST
            Auth:
              Authorizer: KaevoOwnerAuthorizer

        AppSessionStatus:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/app-sessions/status
            Method: GET

        RevokeAppSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/app-sessions/revoke
            Method: POST

        StartHomeConnectorPairing:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/home-connectors/pairing/start
            Method: POST
            Auth:
              Authorizer: KaevoOwnerAuthorizer

        ExchangeHomeConnectorPairing:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v1/home-connectors/pairing/exchange
            Method: POST

        ExchangeHomeConnectorPairingV2:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
            Path: /v2/home-connectors/pairing/exchange
            Method: POST

        StartHomeConnectorRotation:
          Type: HttpApi
          Properties:
            ApiId: !Ref KaevoCloudHttpApi
